services:
  postgres:
    image: postgres:16-alpine
    container_name: algosolver-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: algosolver
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d algosolver"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
